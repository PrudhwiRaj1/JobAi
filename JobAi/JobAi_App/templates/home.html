{%extends 'base.html'%}
{% load static %}
{%block content%}

<div class="main-content">

    <h2 id="profile">Profile</h2><br><br>

    <div class="container w-50 mt-4" style="margin-right: 250px;margin-left: 25px;">
        <h4 class="text-center">Upload Resume in doc,docx format</h4>
        <form method="POST" enctype="multipart/form-data" action="{% url 'read_word_document' %}">
            {% csrf_token %}

            <input type="file" name="word_file" accept=".doc,.docx" required>
            <button type="submit">Upload and Submit</button>
        </form>

        <!-- {% if content %}
            <div class="content">
                <h2>Document Content:</h2>
                <p class="mt-4">{{ content }}</p>
            </div>
            {% endif %} -->
    </div>
    <div class="container1 mt-3" style="margin-left: 20px;">
        <form action="" method="POST" enctype="multipart/form-data" class="mt-5">
            <label for="name">Full Name:</label><span><input type="text" id="name" name="name" class="input1" required></span>

            <label for="email">Email:</label><input type="email" id="email" name="email" class="input1" required>

            <label for="phone">Phone Number:</label><input type="text" id="phone" name="phone"  class="input1" required>

            <label for="experience">Years of Experience:</label><input type="number" id="experience" name="experience" class="input1" required>

            <label for="skills">Skills:</label><input type="text" id="skills" name="skills" class="input1" required>

            <button class="button1 mb-3" type="submit">Update Profile</button>
        </form>
    </div>
    {%endblock%}
