{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAi | Dashboard</title>
    <link rel="icon" href="{% static 'images/JobAi-logo1.png' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style1.css' %}">
    <link rel="stylesheet" href="{%static 'assets/css/dashboard.css'%}">
</head>

<body>
    
    
    <div class="sidebar">
        <img src="{%static 'images/JobAi2.png'%}" alt="JobAi" height="50px" style="border-radius: 25px;">
        <hr class="divider">
        <ul>
            <div class="box">
                <a href="#" class="nav-link"><li>Profile</li></a>
            </div>
            <div class="box">
                <a href="#" class="nav-link"><li>Search Job</li></a>
            </div>
            <div class="box">
                <a href="#" class="nav-link"><li>Applications</li></a>
            </div>
            <div class="box">
                <a href="#" class="nav-link"><li>Messages</li></a>
            </div>
            <div class="box">
                <a href="#" class="nav-link"><li>Statistics</li></a>
            </div>
            <div class="box">
                <a href="#" class="nav-link"><li>News</li></a>
            </div>
        </ul>
    </div>
    <div class="main-content">
        <header>
            <nav>
            <div class="user-info">
                <img src="{%static 'images/profile.jpeg'%}" alt="Profile Picture" class="profile-pic">
                <span>Hello, User</span>
            </div>
        </nav>
        </header>
      
    
        <div class="container">
            <h1>Upload Resume in doc,docx format</h1>
            <form method="POST" enctype="multipart/form-data" action="{% url 'read_word_document' %}">
                {% csrf_token %}
                <input type="file" name="word_file" accept=".doc,.docx" required>
                <button type="submit">Upload and Submit</button>
            </form>
    
            {% if content %}
            <div class="content">
                <h2>Document Content:</h2>
                <p>{{ content }}</p>
            </div>
            {% endif %}
        </div>
    </body>
    
    </html>
</body>

</html>
