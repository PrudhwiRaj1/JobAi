{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAi | Dashboard</title>
    <link rel="icon" href="{% static 'images/JobAi-logo1.png' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style1.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/home.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="{% static 'assets/js/home.js'%}"></script>
    <link rel="stylesheet" href="{% static 'assets/css/search-job.css'%}">
</head>

<body>


    <div class="sidebar">
        <a href="{%url 'index' %}"><img src="{%static 'images/JobAi2.png'%}" alt="JobAi" height="50px"
                style="border-radius: 25px;"></a>
        <hr class="divider">
        <ul>
            <div class="box" onclick="select(this)">
                <a href="{%url 'home'%}" class="nav-link">
                    <li><i class="fa-solid fa-home"></i> &emsp;Profile</li>
                </a>
            </div>
            <div class="box active">
                <a href="{%url 'search-job' %}" class="nav-link">
                    <li><i class="fa-solid fa-search"></i> &emsp;Search Job</li>
                </a>
            </div>
            <div class="box" onclick="select(this)">
                <a href="../#Cover-Letters" class="nav-link">
                    <li><i class="fa-solid fa-envelope"></i> &emsp;Cover Letters</li>
                </a>
            </div>
            <div class="box" onclick="select(this)">
                <a href="../#Mock-Job-Interviews" class="nav-link">
                    <li><i class="fa-solid fa-user"></i> &emsp;Mock Job Interviews</li>
                </a>
            </div>
            <div class="box" onclick="select(this)">
                <a href="../#Saved-jobs" class="nav-link">
                    <li><i class="fa-solid fa-floppy-disk"></i> &emsp;Saved Jobs</li>
                </a>
            </div>
            <div class="box" onclick="select(this)">
                <a href="../#Auto-Apply" class="nav-link">
                    <li><i class="fa-solid fa-bolt"></i> &emsp;Auto Apply</li>
                </a>
            </div>
            <div class="box" onclick="select(this)">
                <a href="../#Settings" class="nav-link">
                    <li><i class="fa-solid fa-gear"></i> &emsp;Settings</li>
                </a>
            </div>
        </ul>
    </div>
    <h1 class="home-title" id="search-job">Search Job</h1><br>
    <br>
    <div class="main-content" >
      <hr><br>
        <div class="search-container">
            <input type="text" placeholder="Search..." />
            <button><i class="fas fa-search"></i></button>
        </div>

</body>
</html>
{% endblock %}
