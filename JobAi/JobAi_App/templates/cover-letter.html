{%extends 'base.html'%}
{% load static %}
{% block content %}

<head>
    <link rel="stylesheet" href="{%static 'assets/css/cover-letter.css'%}">
</head>

<body>
    <div class="main-content">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                <img src="{%static 'images/profile.jpeg'%}" class="rounded-circle" alt="Profile"
                                    height="50px" />
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                <div>
                                    <a href="{%url 'support' %}" class="nav-link fw-bold">
                                        <li><i class="fa-solid fa-comment"></i> &emsp;Support</li>
                                    </a>
                                </div>
                                <div>
                                    <a href="{%url 'user-type'%}" class="nav-link fw-bold">
                                        <li><i class="fas fa-sign-out-alt"></i> &emsp;Logout
                                        </li>
                                    </a>
                                </div>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <h2 id="cover-letter" class="mb-3">AI cover letter generator</h1>
            <div class="" style="margin-top: 95px;">
                <div class="cover-letter-generator coverletterbox w-100" style="position:relative;margin-bottom:50px">

                    <div class="formcoverletter">
                        <form class="formcover">
                            <div class="coverletterformdiv">
                                <div class="row">

                                    <div class="col-lg-3">
                                        <div class="coverletterinputblock"><label
                                                class="coverletterlabel form-label">Job
                                                Title*</label><input required="" placeholder="Ex. Software Developer"
                                                type="text" id="position" class="form-control" value=""></div>
                                    </div>
                                    <div class="col-lg-3">
                                        <div class="coverletterinputblock"><label
                                                class="coverletterlabel form-label">Your
                                                Name*</label><input required="" placeholder="Ex. mehul" type="text"
                                                id="name" class="form-control" value=""></div>
                                    </div>
                                    <div class="col-lg-4">
                                        <div class="coverletterinputblock"><label
                                                class="coverletterlabel form-label">Applying for Company</label><input
                                                required="" placeholder="Ex. google" type="text" id="Companyname"
                                                class="form-control" value=""></div>
                                    </div>
                                    <div class="col-lg-3">
                                        <div class="coverletterinputblock"><label
                                                class="coverletterlabel form-label">Write
                                                Cover Letter To*</label>
                                            <input required="" placeholder="Ex-> Albert, Hr Manager, CEO" type="text"
                                                id="hrname" class="form-control" value="">
                                        </div>
                                    </div>
                                    <div class="col-lg-3">
                                        <div class="coverletterinputblock"><label
                                                class="coverletterlabel form-label">Your
                                                Skills(use ',')</label><input placeholder="Ex. Python,Js,C++"
                                                type="text" id="skills" class="form-control" value=""></div>
                                    </div>
                                    <div class="col-lg-3">
                                        <div class="coverletterinputblock"><label
                                                class="coverletterlabel form-label">Role
                                                Type</label><input placeholder="Ex. fulltime, intership" type="text"
                                                id="roletype" class="form-control" value=""></div>
                                    </div>
                                    <div class="col-lg-3">
                                        <div class="coverletterinputblock"><label
                                                class="coverletterlabel form-label">Job
                                                Location</label><input placeholder="Ex. Bangalore, Remote etc"
                                                type="text" id="location" class="form-control" value=""></div>
                                    </div>
                                </div>
                                <div class="covergeneratorbutton"><button type="submit" class="mx-5 mt-3"><svg x-show="!loading" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"  width="35px">
									<path fill-rule="evenodd" d="M5 4a.75.75 0 0 1 .738.616l.252 1.388A1.25 1.25 0 0 0 6.996 7.01l1.388.252a.75.75 0 0 1 0 1.476l-1.388.252A1.25 1.25 0 0 0 5.99 9.996l-.252 1.388a.75.75 0 0 1-1.476 0L4.01 9.996A1.25 1.25 0 0 0 3.004 8.99l-1.388-.252a.75.75 0 0 1 0-1.476l1.388-.252A1.25 1.25 0 0 0 4.01 6.004l.252-1.388A.75.75 0 0 1 5 4ZM12 1a.75.75 0 0 1 .721.544l.195.682c.118.415.443.74.858.858l.682.195a.75.75 0 0 1 0 1.442l-.682.195a1.25 1.25 0 0 0-.858.858l-.195.682a.75.75 0 0 1-1.442 0l-.195-.682a1.25 1.25 0 0 0-.858-.858l-.682-.195a.75.75 0 0 1 0-1.442l.682-.195a1.25 1.25 0 0 0 .858-.858l.195-.682A.75.75 0 0 1 12 1ZM10 11a.75.75 0 0 1 .728.568.968.968 0 0 0 .704.704.75.75 0 0 1 0 1.456.968.968 0 0 0-.704.704.75.75 0 0 1-1.456 0 .968.968 0 0 0-.704-.704.75.75 0 0 1 0-1.456.968.968 0 0 0 .704-.704A.75.75 0 0 1 10 11Z" clip-rule="evenodd"></path>
								</svg>  Generate Cover Letter</button>
                                </div>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
    </div>
</body>
{% endblock %}
